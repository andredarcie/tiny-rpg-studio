name: Publish SDK to npm

on:
  push:
    tags:
      - 'sdk-v*'   # Dispara em: git tag sdk-v1.0.0 && git push --tags

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Necessário para npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Build SDK
        run: npm run build:sdk

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Use SDK README for npm package
        run: cp SDK_README.md README.md

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
